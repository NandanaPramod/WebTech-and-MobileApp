<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<style>

.map-container {
    position: relative;
    max-width: 900px;
    margin: auto;
}

.map-container img {
    width: 100%;
    border-radius: 10px;
}

/* PIN STYLE */
.pin {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #4fb89f;
    border-radius: 50%;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: 0.3s;
}

/* GLOW EFFECT */
.pin:hover {
    transform: translate(-50%, -50%) scale(1.4);
    box-shadow: 0 0 12px #66c2a5;
}

/* TOOLTIP */
.pin::after {
    content: attr(data-name);
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #132f2a;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    opacity: 0;
    white-space: nowrap;
    transition: 0.3s;
}

.pin:hover::after {
    opacity: 1;
}

/* BETTER POSITIONS */
.india { top: 60%; left: 70%; }
.usa { top: 45%; left: 22%; }
.uk { top: 32%; left: 48%; }

</style>

</head>

<body>

<div class="navbar">
<a href="../index.html">WorkWave</a>
</div>

<div class="container">

<h1>Freelancer Locations</h1>
<p class="subtle">Click a region to view freelancers</p>

<div class="map-container">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg">

<a href="1_5_content.html">
<div class="pin india" data-name="India"></div>
</a>

<a href="1_5_content.html">
<div class="pin usa" data-name="USA"></div>
</a>

<a href="1_5_content.html">
<div class="pin uk" data-name="UK"></div>
</a>

</div>

</div>

<div class="footer">
© 2026 WorkWave
</div>

</body>
</html>
