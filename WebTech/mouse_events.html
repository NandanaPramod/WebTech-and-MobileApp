  <h2>🖱️ Interactive Mouse Events Demo</h2>
  <div class="interactive-box" id="mouseBox" 
       onmouseover="handleEvent('mouseover', 'green')" 
       onmouseout="handleEvent('mouseout', '#38443f')" 
       onclick="handleEvent('click', '#545b33')">
    Hover, leave, or click me!
  </div>
  <div id="eventMessage" class="event-msg">Event will appear here</div>
</main>
<script>
  const box = document.getElementById('mouseBox');
  const msgDiv = document.getElementById('eventMessage');
  function handleEvent(eventName, bgColor) {
    box.style.backgroundColor = bgColor;
    let text = '';
    if(eventName === 'mouseover') text = '🐭 Mouse Over — style changed!';
    else if(eventName === 'mouseout') text = '👋 Mouse Out — style reset.';
    else if(eventName === 'click') text = '🔘 Click detected! Interactive element activated.';
    msgDiv.innerHTML = `<strong>${text}</strong>`;
  }
</script>
