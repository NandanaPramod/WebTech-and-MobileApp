</nav><main class="container">
  <h2>👥 Employee Database</h2>
  <button id="displayEmpBtn" class="btn-primary">Show Employee List</button>
  <button id="calcSalaryBtn" class="btn-accent" style="margin-left:1rem;">Calculate Total Salary</button>
  <div id="empTableContainer" style="margin-top:2rem;"></div>
  <div id="totalSalaryDiv" style="margin-top:1rem; font-weight:bold;"></div>
</main>
<script>
  const employees = [
    { id: 101, name: "Arun Kumar", designation: "Lead Developer", salary: 85000 },
    { id: 102, name: "Divya Sharma", designation: "UI/UX Director", salary: 78000 },
    { id: 103, name: "Karthik Raj", designation: "AI Engineer", salary: 92000 },
    { id: 104, name: "Meena Iyer", designation: "Project Manager", salary: 89000 }
  ];
  function displayEmployees() {
    let html = '<table class="data-table"><thead><tr><th>Emp ID</th><th>Name</th><th>Designation</th><th>Salary (USD)</th></tr></thead><tbody>';
    employees.forEach(emp => { html += `<tr><td>${emp.id}</td><td>${emp.name}</td><td>${emp.designation}</td><td>$${emp.salary}</td></tr>`; });
    html += '</tbody></table>';
    document.getElementById('empTableContainer').innerHTML = html;
  }
  function calcTotalSalary() {
    const total = employees.reduce((sum, e) => sum + e.salary, 0);
    document.getElementById('totalSalaryDiv').innerHTML = `💰 Total Monthly Expenditure: $${total}`;
  }
  document.getElementById('displayEmpBtn').addEventListener('click', displayEmployees);
  document.getElementById('calcSalaryBtn').addEventListener('click', calcTotalSalary);
</script>
</body></html>
