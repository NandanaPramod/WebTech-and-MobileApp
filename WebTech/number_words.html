<main class="container">
  <h2>Convert Number to English Words (0–999)</h2>
  <div class="form-group"><label>Enter number:</label><input type="text" id="numInput" placeholder="e.g., 123"></div>
  <button id="convertBtn" class="btn-primary">Convert</button>
  <div id="wordOutput" class="word-result"></div>
</main>
<script>
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine'];
  const teens = ['Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function numberToWords(num) {
    if(num === 0) return 'Zero';
    let word = '';
    if(num >= 100) { word += ones[Math.floor(num/100)] + ' Hundred '; num %= 100; }
    if(num >= 10 && num <= 19) { word += teens[num-10]; num = 0; }
    else if(num >= 20) { word += tens[Math.floor(num/10)] + ' '; num %= 10; }
    if(num > 0 && num < 10) word += ones[num];
    return word.trim();
  }
  document.getElementById('convertBtn').addEventListener('click', () => {
    let val = document.getElementById('numInput').value.trim();
    if(!/^\d+$/.test(val)) { alert('Only digits allowed (0-999)'); return; }
    let num = parseInt(val,10);
    if(num > 999) { alert('Number must be between 0 and 999'); return; }
    document.getElementById('wordOutput').innerHTML = `In words: ${numberToWords(num)}`;
  });
</script>
</body></html>
