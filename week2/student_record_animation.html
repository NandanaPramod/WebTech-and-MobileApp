<!DOCTYPE html>
<html>
<head>
<title>Freelancer Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body {
    font-family:Poppins;
    background:linear-gradient(to right,#563931,#7d6157);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    width:400px;
    padding:20px;
    background:white;
    border-radius:12px;
    animation:slide 1.5s ease;
}

h2 {
    text-align:center;
    animation:glow 2s infinite alternate;
}

table {
    width:100%;
    border-collapse:collapse;
}

td {
    padding:10px;
    border:1px solid #ccc;
}

.label {
    font-weight:bold;
    background:#a08275;
}

@keyframes slide {
    from { transform:translateY(-50px); opacity:0; }
    to { transform:translateY(0); opacity:1; }
}

@keyframes glow {
    from { color:#563931; }
    to { color:#a08275; }
}

</style>

</head>

<body>

<div class="card">
<h2>Freelancer Profile</h2>

<table>
<tr><td class="label">Name</td><td>Alex</td></tr>
<tr><td class="label">Skill</td><td>Web Dev</td></tr>
<tr><td class="label">Experience</td><td>3 Years</td></tr>
<tr><td class="label">Contact</td><td>alex@mail.com</td></tr>
</table>

</div>

</body>
</html>
